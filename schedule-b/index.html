<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 16px 40px;font-family:'Mulish',sans-serif;background:#141416}

  @keyframes scPulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes scDot{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-4px);opacity:1}}
  .sc-screen,.sc-in{animation:scRise .3s ease both}
  .sc-thread::-webkit-scrollbar{width:7px}.sc-thread::-webkit-scrollbar-thumb{background:#d8d2c8;border-radius:99px}
  input::placeholder{color:#7b7b82}
  .sc-card{width:100%;max-width:600px;display:flex;flex-direction:column;border-radius:20px;overflow:hidden;background:#141416;min-height:600px;border:1px solid #2c2c30;box-shadow:0 30px 70px rgba(0,0,0,.4);position:relative}
  .sc-home{position:fixed;top:16px;left:18px;display:flex;align-items:center;gap:9px;text-decoration:none;font:800 13px 'Mulish';color:#c9c9cd}
  .sc-home:hover{color:#fff} .sc-home img{width:26px;height:26px;object-fit:contain}
</style>
</head><body>

  </form>
