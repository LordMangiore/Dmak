# Netlify build config for DMAK'S HVAC
# The site is generated by build.js (plain Node, no dependencies) and published from the repo root.
# The built HTML is also committed, so it deploys fine even if the build step is skipped.
[build]
  command = "node build.js"
  publish = "."

[build.environment]
  # This is a 100% public static marketing site (HTML/CSS/JS) with no backend,
  # API keys, or secrets — every file is served publicly. Netlify's default
  # secret scanner was throwing false positives and blocking deploys, so it's
  # disabled here. Re-enable (and use SECRETS_SCAN_OMIT_PATHS) if real secrets
  # are ever introduced.
  SECRETS_SCAN_ENABLED = "false"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
