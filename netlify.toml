# Netlify build config for DMAK'S HVAC
# The site is generated by build.js (plain Node, no dependencies) and published from the repo root.
# The built HTML is also committed, so it deploys fine even if the build step is skipped.
[build]
  command = "node build.js"
  publish = "."

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
